<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>PodCastMix · Estúdio Profissional</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}

:root {
  --bg: #0B0E14;
  --surface: #131A24;
  --surface2: #1A2330;
  --card: #1E2A3A;
  --border: rgba(255,255,255,0.06);
  --accent: #FF6B4A;
  --accent-glow: rgba(255,107,74,0.3);
  --text: #F0F3FA;
  --text2: #9CA9BF;
  --text3: #5E6F8D;
  --green: #2ECC71;
  --red: #E74C3C;
  --amber: #F39C12;
  --radius: 24px;
  --radius-sm: 16px;
  --nav-h: 72px;
  --top-h: 68px;
  --font: 'Inter', sans-serif;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font);
  overflow: hidden;
  height: 100%;
  position: fixed;
  width: 100%;
}

.app-scroll {
  position: fixed;
  top: var(--top-h);
  bottom: var(--nav-h);
  left: 0;
  right: 0;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding: 16px 16px 24px;
}

.top-bar {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  height: var(--top-h);
  background: rgba(11,14,20,0.92);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 18px;
  z-index: 20;
}
.logo h1 {
  font-size: 1.4rem;
  font-weight: 800;
  background: linear-gradient(135deg, #FF6B4A, #FFB347);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
}
.logo span {
  font-size: 0.65rem;
  color: var(--text3);
  display: block;
  margin-top: -4px;
}
.status-pill {
  background: var(--surface);
  padding: 6px 12px;
  border-radius: 40px;
  font-size: 0.7rem;
  font-weight: 600;
  display: flex;
  align-items: center;
  gap: 6px;
}
.dot {
  width: 8px;
  height: 8px;
  border-radius: 10px;
  background: #6C7A8F;
}
.dot.rec { background: var(--red); box-shadow: 0 0 6px var(--red); animation: pulse 1s infinite; }
.dot.paused { background: var(--amber); }

.bottom-nav {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  height: var(--nav-h);
  background: rgba(11,14,20,0.96);
  backdrop-filter: blur(20px);
  border-top: 1px solid var(--border);
  display: flex;
  justify-content: space-around;
  align-items: center;
  padding-bottom: env(safe-area-inset-bottom);
  z-index: 20;
}
.nav-btn {
  background: none;
  border: none;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  font-size: 0.7rem;
  font-weight: 600;
  color: var(--text3);
  transition: 0.2s;
  padding: 8px 12px;
  border-radius: 30px;
}
.nav-btn.active {
  color: var(--accent);
  background: rgba(255,107,74,0.12);
}
.nav-icon { font-size: 1.5rem; }
.rec-fab {
  background: linear-gradient(145deg, var(--accent), #E63E17);
  width: 56px;
  height: 56px;
  border-radius: 56px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.8rem;
  box-shadow: 0 0 16px var(--accent-glow);
  margin-top: -12px;
  transition: 0.1s ease;
}
.rec-fab:active { transform: scale(0.94); }

.card {
  background: var(--card);
  border-radius: var(--radius);
  padding: 18px;
  margin-bottom: 18px;
  border: 1px solid var(--border);
}
.section-title {
  font-size: 0.8rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--text3);
  margin-bottom: 14px;
}
.btn-row {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
}
.btn {
  padding: 12px 20px;
  border-radius: 40px;
  font-weight: 700;
  font-size: 0.85rem;
  border: none;
  background: var(--surface2);
  color: var(--text);
  cursor: pointer;
  transition: 0.1s;
  flex: 1 0 auto;
  text-align: center;
}
.btn-primary {
  background: linear-gradient(135deg, var(--accent), #E63E17);
  box-shadow: 0 4px 12px rgba(255,107,74,0.3);
}
.btn-danger { background: rgba(231,76,60,0.2); color: var(--red); }
.btn-success { background: rgba(46,204,113,0.2); color: var(--green); }
.btn:active { transform: scale(0.97); }

.timer {
  font-family: monospace;
  font-size: 2.8rem;
  font-weight: 800;
  letter-spacing: 3px;
  text-align: center;
  background: var(--surface);
  padding: 12px;
  border-radius: 60px;
  margin-bottom: 12px;
}
.meter {
  background: #0F111A;
  border-radius: 40px;
  height: 6px;
  overflow: hidden;
  margin: 12px 0;
}
.meter-fill {
  width: 0%;
  height: 100%;
  background: linear-gradient(90deg, var(--green), var(--amber), var(--accent));
}
.take-item {
  background: var(--surface2);
  border-radius: var(--radius-sm);
  padding: 14px;
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 12px;
}
.take-name {
  font-weight: 600;
  flex: 1;
  font-size: 0.9rem;
  word-break: break-word;
}
.take-actions button {
  background: none;
  border: none;
  font-size: 1.2rem;
  padding: 8px;
  cursor: pointer;
  color: var(--text2);
}
.track-row {
  background: var(--surface2);
  border-radius: var(--radius-sm);
  padding: 12px;
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 10px;
}
.track-play {
  width: 44px;
  height: 44px;
  border-radius: 44px;
  background: var(--surface);
  border: none;
  font-size: 1.2rem;
  color: var(--text);
}
.track-info { flex: 1; }
.track-title { font-weight: 600; font-size: 0.9rem; }
.eq-row {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 14px;
}
.eq-row label {
  width: 80px;
  font-size: 0.75rem;
  font-weight: 600;
}
input[type="range"] {
  flex: 1;
  height: 4px;
  -webkit-appearance: none;
  background: var(--surface);
  border-radius: 4px;
}
input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 18px;
  height: 18px;
  border-radius: 18px;
  background: var(--accent);
  cursor: pointer;
}
select, input, textarea {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 30px;
  padding: 12px 16px;
  color: var(--text);
  font-size: 0.85rem;
  width: 100%;
}
.modal-mask {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.8);
  backdrop-filter: blur(8px);
  z-index: 100;
  display: flex;
  align-items: flex-end;
  justify-content: center;
  visibility: hidden;
  opacity: 0;
  transition: 0.2s;
}
.modal-mask.open { visibility: visible; opacity: 1; }
.modal-card {
  background: var(--card);
  width: 100%;
  border-radius: 28px 28px 0 0;
  padding: 24px 20px 32px;
  max-height: 85vh;
  overflow-y: auto;
}
.toast-zone {
  position: fixed;
  bottom: 80px;
  left: 16px;
  right: 16px;
  z-index: 200;
  display: flex;
  flex-direction: column;
  gap: 8px;
  pointer-events: none;
}
.toast {
  background: var(--surface);
  border-left: 4px solid var(--accent);
  padding: 12px 16px;
  border-radius: 40px;
  font-size: 0.8rem;
  font-weight: 500;
  backdrop-filter: blur(12px);
}
@keyframes pulse { 0%,100%{ opacity:1; } 50%{ opacity:0.4; } }
</style>
</head>
<body>

<div class="top-bar">
  <div class="logo"><h1>PodCastMix</h1><span>estúdio profissional</span></div>
  <div class="status-pill"><div class="dot" id="statusLed"></div><span id="statusLabel">Pronto</span></div>
</div>

<div class="app-scroll" id="appScroll">
  <div id="studioPage">
    <div class="card">
      <input type="text" id="epTitleInput" placeholder="Título do episódio" value="Episódio #1">
      <textarea id="epDescInput" rows="2" placeholder="Descrição..." style="margin-top:8px;"></textarea>
    </div>
    <div class="card">
      <div class="section-title">🎙️ MICROFONE EXTERNO</div>
      <select id="micDeviceSelect"></select>
      <div style="font-size:12px; color:var(--text3); margin-top:6px;">✔️ USB, Bluetooth, P2 — detectados automaticamente</div>
    </div>
    <div class="card">
      <div class="timer" id="timerDisplay">00:00:00</div>
      <div class="meter"><div class="meter-fill" id="meterFill"></div></div>
      <div class="btn-row" style="margin-top:12px;">
        <button class="btn btn-primary" id="recBtn">⏺ GRAVAR</button>
        <button class="btn" id="pauseRecBtn" disabled>⏸ Pausar</button>
        <button class="btn btn-danger" id="stopRecBtn" disabled>⏹ Parar</button>
      </div>
    </div>
    <div class="card">
      <div class="section-title">🎵 TRILHA SONORA (mixagem automática)</div>
      <div id="musicLibraryList"></div>
      <div class="btn-row" style="margin-top:8px;">
        <label class="btn" style="flex:1;">📁 Importar áudio<input type="file" id="musicFileInput" accept="audio/mpeg,audio/wav,audio/ogg,audio/mp4,audio/webm" style="display:none;"></label>
        <button class="btn" id="stopMusicBtn">🔇 Parar música</button>
      </div>
      <div style="margin-top:12px;">
        <label style="font-size:0.7rem;">Volume música (ducking automático na fala)</label>
        <input type="range" id="musicVolume" min="0" max="100" value="30">
        <span id="musicVolVal">30%</span>
      </div>
    </div>
    <div class="card">
      <div class="section-title">🎚️ EQ + COMPRESSOR (voz)</div>
      <div class="eq-row"><label>Graves (80Hz)</label><input type="range" id="eqBass" min="-12" max="12" value="2"><span id="eqBassVal">+2</span></div>
      <div class="eq-row"><label>Médios (1kHz)</label><input type="range" id="eqMid" min="-12" max="12" value="1"><span id="eqMidVal">+1</span></div>
      <div class="eq-row"><label>Agudos (8kHz)</label><input type="range" id="eqTreble" min="-12" max="12" value="3"><span id="eqTrebleVal">+3</span></div>
      <div class="eq-row"><label>Compressor</label><button class="btn" id="compToggleBtn" style="padding:6px 12px;">ON</button></div>
      <div class="eq-row"><label>Gate de ruído</label><button class="btn" id="gateToggleBtn" style="padding:6px 12px;">ON</button></div>
    </div>
    <div class="card">
      <div class="section-title">📼 TAKES GRAVADOS</div>
      <div id="takesContainer"><div style="color:var(--text3); text-align:center;">Nenhum take ainda</div></div>
    </div>
  </div>
  <div id="episodesPage" style="display:none;">
    <div class="card">
      <div class="section-title">📋 EPISÓDIOS SALVOS</div>
      <div id="episodesList"></div>
      <button class="btn btn-primary" id="newEpisodeBtn" style="margin-top:12px;">+ Novo Episódio</button>
    </div>
  </div>
  <div id="settingsPage" style="display:none;">
    <div class="card">
      <div class="section-title">⚙️ PROCESSAMENTO</div>
      <div class="eq-row"><label>Cancelamento ruído</label><button class="btn" id="noiseSuppressBtn" style="padding:6px 12px;">ON</button></div>
      <div class="eq-row"><label>Ganho automático</label><button class="btn" id="autoGainBtn" style="padding:6px 12px;">ON</button></div>
      <div class="section-title" style="margin-top:16px;">💾 ARMAZENAMENTO</div>
      <button class="btn btn-danger" id="clearDataBtn">Limpar todos os dados</button>
    </div>
  </div>
</div>

<div class="bottom-nav">
  <button class="nav-btn active" data-page="studio">🎙<span>Estúdio</span></button>
  <button class="nav-btn" data-page="episodes">📋<span>Episódios</span></button>
  <div class="rec-fab" id="fabRecBtn">⏺</div>
  <button class="nav-btn" data-page="settings">⚙️<span>Config</span></button>
  <button class="nav-btn" id="fabNewEpBtn">➕<span>Novo</span></button>
</div>
<div class="toast-zone" id="toastZone"></div>

<script>
// ====================== INDEXEDDB ======================
const DB_NAME = 'PodcastMixDB';
const DB_VERSION = 3;
let db = null;

function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = (e) => {
      const d = e.target.result;
      if (!d.objectStoreNames.contains('episodes')) d.createObjectStore('episodes', { keyPath: 'id' });
      if (!d.objectStoreNames.contains('takes')) d.createObjectStore('takes', { keyPath: 'id' });
    };
    req.onsuccess = () => { db = req.result; resolve(db); };
    req.onerror = () => reject(req.error);
  });
}
async function saveEpisode(ep) { const tx = db.transaction('episodes', 'readwrite'); tx.objectStore('episodes').put(ep); return tx.complete; }
async function saveTake(take) { const tx = db.transaction('takes', 'readwrite'); tx.objectStore('takes').put(take); return tx.complete; }
async function getAllEpisodes() { const tx = db.transaction('episodes', 'readonly'); return await tx.objectStore('episodes').getAll(); }
async function getTakesByEpisode(episodeId) { const tx = db.transaction('takes', 'readonly'); const all = await tx.objectStore('takes').getAll(); return all.filter(t => t.episodeId === episodeId); }
async function deleteTakeById(id) { const tx = db.transaction('takes', 'readwrite'); tx.objectStore('takes').delete(id); return tx.complete; }
async function deleteAllData() { const tx = db.transaction(['episodes','takes'], 'readwrite'); tx.objectStore('episodes').clear(); tx.objectStore('takes').clear(); return tx.complete; }

// ====================== ÁUDIO GLOBAL ======================
let audioCtx = null;
let micStream = null;
let micSource = null;
let musicGain = null;
let musicSourceNode = null;
let currentMusicBuffer = null;
let mixerDestination = null;
let mediaRecorder = null;
let recordedChunks = [];
let isRecording = false;
let isPaused = false;
let recordingSeconds = 0;
let timerInterval = null;
let duckingInterval = null;

// nós de processamento
let bassFilter, midFilter, trebleFilter, compressor, gateGain, micGain;
let compressorEnabled = true;
let gateEnabled = true;

// estado dos takes e episódios
let currentEpisodeId = Date.now();
let episodes = [];
let takes = []; // array de takes do episódio atual com { id, name, duration, blob, blobURL }

// ====================== INICIALIZAÇÃO DO MIXER ======================
async function initAudioContext() {
  if (audioCtx && audioCtx.state !== 'closed') return audioCtx;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  bassFilter = audioCtx.createBiquadFilter(); bassFilter.type = 'peaking'; bassFilter.frequency.value = 80; bassFilter.Q.value = 0.7;
  midFilter = audioCtx.createBiquadFilter(); midFilter.type = 'peaking'; midFilter.frequency.value = 1000; midFilter.Q.value = 0.7;
  trebleFilter = audioCtx.createBiquadFilter(); trebleFilter.type = 'peaking'; trebleFilter.frequency.value = 8000; trebleFilter.Q.value = 0.7;
  compressor = audioCtx.createDynamicsCompressor(); compressor.threshold.value = -24; compressor.knee.value = 6; compressor.ratio.value = 4; compressor.attack.value = 0.003; compressor.release.value = 0.25;
  gateGain = audioCtx.createGain(); gateGain.gain.value = 1;
  micGain = audioCtx.createGain();
  musicGain = audioCtx.createGain(); musicGain.gain.value = 0.3;
  mixerDestination = audioCtx.createMediaStreamDestination();
  return audioCtx;
}

async function connectMicrophone(deviceId = null) {
  if (micStream) { micStream.getTracks().forEach(t => t.stop()); if (micSource) micSource.disconnect(); }
  const noiseSuppress = document.getElementById('noiseSuppressBtn').innerText === 'ON';
  const autoGain = document.getElementById('autoGainBtn').innerText === 'ON';
  const constraints = { audio: { deviceId: deviceId ? { exact: deviceId } : undefined, echoCancellation: false, noiseSuppression: noiseSuppress, autoGainControl: autoGain } };
  micStream = await navigator.mediaDevices.getUserMedia(constraints);
  await initAudioContext();
  micSource = audioCtx.createMediaStreamSource(micStream);
  micSource.connect(bassFilter); bassFilter.connect(midFilter); midFilter.connect(trebleFilter);
  trebleFilter.connect(compressor); compressor.connect(gateGain); gateGain.connect(micGain);
  micGain.connect(audioCtx.destination); micGain.connect(mixerDestination);
  if (musicGain) { musicGain.connect(audioCtx.destination); musicGain.connect(mixerDestination); }
  updateEQ(); updateCompressorGate();
  toast('🎤 Microfone conectado com processamento', 'success');
}

function updateEQ() {
  if (!bassFilter) return;
  bassFilter.gain.value = parseFloat(document.getElementById('eqBass').value);
  midFilter.gain.value = parseFloat(document.getElementById('eqMid').value);
  trebleFilter.gain.value = parseFloat(document.getElementById('eqTreble').value);
  document.getElementById('eqBassVal').innerText = bassFilter.gain.value;
  document.getElementById('eqMidVal').innerText = midFilter.gain.value;
  document.getElementById('eqTrebleVal').innerText = trebleFilter.gain.value;
}
function updateCompressorGate() {
  if (compressorEnabled) { compressor.ratio.value = 4; compressor.threshold.value = -24; }
  else { compressor.ratio.value = 1; compressor.threshold.value = 0; }
  gateGain.gain.value = gateEnabled ? 0.9 : 1;
}

// ====================== MÚSICA E DUCKING ======================
async function loadMusic(file) {
  if (!audioCtx) await initAudioContext();
  const arrayBuffer = await file.arrayBuffer();
  const decoded = await audioCtx.decodeAudioData(arrayBuffer);
  currentMusicBuffer = decoded;
  if (musicSourceNode) { try { musicSourceNode.stop(); musicSourceNode.disconnect(); } catch(e) {} }
  const src = audioCtx.createBufferSource();
  src.buffer = currentMusicBuffer; src.loop = true;
  src.connect(musicGain); src.start();
  musicSourceNode = src;
  toast(`🎵 "${file.name}" carregada e mixada na gravação`, 'success');
}
function stopMusic() {
  if (musicSourceNode) { try { musicSourceNode.stop(); } catch(e) {} musicSourceNode = null; }
  currentMusicBuffer = null;
  toast('🔇 Música desligada', 'info');
}
function updateMusicVolume() {
  let val = parseInt(document.getElementById('musicVolume').value) / 100;
  if (musicGain) musicGain.gain.value = val;
  document.getElementById('musicVolVal').innerText = document.getElementById('musicVolume').value + '%';
}
function startDucking() {
  if (duckingInterval) clearInterval(duckingInterval);
  if (!micSource) return;
  const analyser = audioCtx.createAnalyser(); analyser.fftSize = 256;
  micSource.connect(analyser);
  const data = new Uint8Array(analyser.frequencyBinCount);
  duckingInterval = setInterval(() => {
    if (!isRecording || isPaused || !musicGain) return;
    analyser.getByteFrequencyData(data);
    let sum = 0; for (let i=0; i<data.length; i++) sum += data[i];
    let avg = sum / data.length;
    let baseVol = parseInt(document.getElementById('musicVolume').value) / 100;
    let target = baseVol;
    if (avg > 35) target = 0.08;
    else if (avg > 20) target = baseVol * 0.35;
    musicGain.gain.value = Math.min(0.35, target);
  }, 120);
}
function stopDucking() {
  if (duckingInterval) clearInterval(duckingInterval);
  updateMusicVolume();
}

// ====================== GRAVAÇÃO ======================
async function startRecording() {
  if (isRecording) return;
  if (!audioCtx || audioCtx.state === 'closed') await initAudioContext();
  if (!micStream) await connectMicrophone(document.getElementById('micDeviceSelect').value);
  if (audioCtx.state === 'suspended') await audioCtx.resume();
  const stream = mixerDestination.stream;
  if (!stream) throw new Error("Mixer stream indisponível");
  mediaRecorder = new MediaRecorder(stream, { mimeType: 'audio/webm' });
  recordedChunks = [];
  mediaRecorder.ondataavailable = e => { if (e.data.size) recordedChunks.push(e.data); };
  mediaRecorder.start(100);
  isRecording = true; isPaused = false;
  recordingSeconds = 0;
  if (timerInterval) clearInterval(timerInterval);
  timerInterval = setInterval(() => { if (!isPaused) { recordingSeconds++; updateTimerDisplay(); } }, 1000);
  document.getElementById('statusLed').className = 'dot rec';
  document.getElementById('statusLabel').innerText = 'GRAVANDO';
  document.getElementById('recBtn').innerHTML = '🔴 GRAVANDO';
  document.getElementById('pauseRecBtn').disabled = false;
  document.getElementById('stopRecBtn').disabled = false;
  startDucking();
  toast('🔴 Gravação iniciada — música sendo mixada automaticamente', 'success');
}
function pauseRecording() {
  if (!isRecording) return;
  if (mediaRecorder && mediaRecorder.state === 'recording') {
    mediaRecorder.pause(); isPaused = true;
    document.getElementById('statusLed').className = 'dot paused';
    document.getElementById('statusLabel').innerText = 'PAUSADO';
    document.getElementById('pauseRecBtn').innerHTML = '▶ Retomar';
    toast('Gravação pausada', 'info');
  } else if (mediaRecorder && mediaRecorder.state === 'paused') {
    mediaRecorder.resume(); isPaused = false;
    document.getElementById('statusLed').className = 'dot rec';
    document.getElementById('statusLabel').innerText = 'GRAVANDO';
    document.getElementById('pauseRecBtn').innerHTML = '⏸ Pausar';
    toast('Gravação retomada', 'info');
  }
}
async function stopRecording() {
  if (!isRecording) return;
  if (mediaRecorder && mediaRecorder.state !== 'inactive') {
    mediaRecorder.stop();
    await new Promise(resolve => { mediaRecorder.onstop = resolve; });
    if (recordedChunks.length) {
      const blob = new Blob(recordedChunks, { type: 'audio/webm' });
      const takeName = `Take ${takes.length+1} - ${new Date().toLocaleTimeString()}`;
      const takeId = Date.now();
      const takeData = { id: takeId, episodeId: currentEpisodeId, name: takeName, duration: recordingSeconds, blob: blob, createdAt: Date.now() };
      await saveTake(takeData);
      const url = URL.createObjectURL(blob);
      takes.push({ ...takeData, blobURL: url });
      renderTakes();
      toast(`✅ Take salvo: ${takeName}`, 'success');
    }
    recordedChunks = [];
  }
  clearInterval(timerInterval);
  isRecording = false; isPaused = false;
  document.getElementById('statusLed').className = 'dot';
  document.getElementById('statusLabel').innerText = 'Pronto';
  document.getElementById('recBtn').innerHTML = '⏺ GRAVAR';
  document.getElementById('pauseRecBtn').disabled = true;
  document.getElementById('stopRecBtn').disabled = true;
  stopDucking(); updateMusicVolume();
}
function updateTimerDisplay() {
  let h = Math.floor(recordingSeconds/3600), m = Math.floor((recordingSeconds%3600)/60), s = recordingSeconds%60;
  document.getElementById('timerDisplay').innerText = `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
}

// ====================== UI: TAKES E PLAYBACK CORRIGIDO ======================
function renderTakes() {
  const container = document.getElementById('takesContainer');
  if (!takes.length) {
    container.innerHTML = '<div style="color:var(--text3); text-align:center;">Nenhum take ainda</div>';
    return;
  }
  container.innerHTML = takes.map((tk, idx) => `
    <div class="take-item" data-take-id="${tk.id}">
      <div class="take-name">${escapeHtml(tk.name)}</div>
      <div>${Math.floor(tk.duration/60)}:${(tk.duration%60).toString().padStart(2,'0')}</div>
      <div class="take-actions">
        <button class="play-take-btn" data-id="${tk.id}">▶</button>
        <button class="delete-take-btn" data-id="${tk.id}">🗑</button>
      </div>
    </div>
  `).join('');
  // Vincular eventos de forma segura
  document.querySelectorAll('.play-take-btn').forEach(btn => {
    btn.addEventListener('click', async (e) => {
      e.stopPropagation();
      const takeId = parseInt(btn.dataset.id);
      const take = takes.find(t => t.id === takeId);
      if (!take || !take.blob) { toast('Áudio não disponível', 'error'); return; }
      try {
        const audio = new Audio();
        const url = URL.createObjectURL(take.blob);
        audio.src = url;
        audio.onended = () => URL.revokeObjectURL(url);
        await audio.play();
        toast(`Reproduzindo: ${take.name}`, 'info');
      } catch(err) { toast('Erro ao reproduzir: ' + err.message, 'error'); }
    });
  });
  document.querySelectorAll('.delete-take-btn').forEach(btn => {
    btn.addEventListener('click', async (e) => {
      e.stopPropagation();
      const takeId = parseInt(btn.dataset.id);
      if (confirm('Excluir este take permanentemente?')) {
        await deleteTakeById(takeId);
        const index = takes.findIndex(t => t.id === takeId);
        if (index !== -1) { if (takes[index].blobURL) URL.revokeObjectURL(takes[index].blobURL); takes.splice(index,1); }
        renderTakes();
        toast('Take removido', 'info');
      }
    });
  });
}
function escapeHtml(str) { return str.replace(/[&<>]/g, function(m){if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }

// ====================== EPISÓDIOS ======================
async function renderEpisodesList() {
  const episodesList = await getAllEpisodes();
  episodes = episodesList.sort((a,b)=>b.createdAt - a.createdAt);
  const container = document.getElementById('episodesList');
  if (!episodes.length) { container.innerHTML = '<div style="color:var(--text3);">Nenhum episódio. Crie um!</div>'; return; }
  container.innerHTML = episodes.map(ep => `
    <div class="take-item" style="flex-direction:column;align-items:flex-start;">
      <div><strong>${escapeHtml(ep.title)}</strong></div>
      <div style="font-size:0.75rem; color:var(--text2);">${new Date(ep.createdAt).toLocaleDateString()}</div>
      <button class="btn load-episode-btn" data-id="${ep.id}" style="margin-top:6px;padding:6px 12px;">Carregar</button>
    </div>
  `).join('');
  document.querySelectorAll('.load-episode-btn').forEach(btn => {
    btn.addEventListener('click', async () => { await loadEpisode(parseInt(btn.dataset.id)); showPage('studio'); });
  });
}
async function loadEpisode(epId) {
  currentEpisodeId = epId;
  const episode = episodes.find(e => e.id === epId);
  if (episode) { document.getElementById('epTitleInput').value = episode.title; document.getElementById('epDescInput').value = episode.desc || ''; }
  const takesData = await getTakesByEpisode(epId);
  // Limpar URLs antigas
  takes.forEach(t => { if (t.blobURL) URL.revokeObjectURL(t.blobURL); });
  takes = takesData.map(t => ({ ...t, blobURL: URL.createObjectURL(t.blob) }));
  renderTakes();
  toast(`Episódio "${episode?.title}" carregado`, 'success');
}
async function createNewEpisode(title) {
  const newEp = { id: Date.now(), title: title, desc: '', createdAt: Date.now() };
  await saveEpisode(newEp);
  episodes.push(newEp);
  currentEpisodeId = newEp.id;
  document.getElementById('epTitleInput').value = title;
  document.getElementById('epDescInput').value = '';
  takes.forEach(t => { if (t.blobURL) URL.revokeObjectURL(t.blobURL); });
  takes = [];
  renderTakes();
  toast(`Episódio "${title}" criado`, 'success');
  await renderEpisodesList();
  showPage('studio');
}

// ====================== NAVEGAÇÃO E EVENTOS ======================
function showPage(page) {
  document.getElementById('studioPage').style.display = page === 'studio' ? 'block' : 'none';
  document.getElementById('episodesPage').style.display = page === 'episodes' ? 'block' : 'none';
  document.getElementById('settingsPage').style.display = page === 'settings' ? 'block' : 'none';
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.querySelector(`.nav-btn[data-page="${page}"]`).classList.add('active');
  if (page === 'episodes') renderEpisodesList();
}

async function loadAudioDevices() {
  await navigator.mediaDevices.getUserMedia({ audio: true });
  const devices = await navigator.mediaDevices.enumerateDevices();
  const mics = devices.filter(d => d.kind === 'audioinput');
  const select = document.getElementById('micDeviceSelect');
  select.innerHTML = mics.map(m => `<option value="${m.deviceId}">${m.label || 'Microfone'}</option>`).join('');
  if (mics.length) { await connectMicrophone(mics[0].deviceId); select.onchange = () => connectMicrophone(select.value); }
  else toast('Nenhum microfone detectado', 'error');
}
function toast(msg, type='info') {
  const t = document.createElement('div'); t.className = 'toast'; t.innerText = msg;
  document.getElementById('toastZone').appendChild(t);
  setTimeout(() => t.remove(), 2800);
}

// Eventos DOM
document.getElementById('recBtn').onclick = startRecording;
document.getElementById('pauseRecBtn').onclick = pauseRecording;
document.getElementById('stopRecBtn').onclick = stopRecording;
document.getElementById('fabRecBtn').onclick = () => { if(isRecording) stopRecording(); else startRecording(); };
document.getElementById('eqBass').addEventListener('input', updateEQ);
document.getElementById('eqMid').addEventListener('input', updateEQ);
document.getElementById('eqTreble').addEventListener('input', updateEQ);
document.getElementById('compToggleBtn').onclick = () => { compressorEnabled = !compressorEnabled; updateCompressorGate(); document.getElementById('compToggleBtn').innerText = compressorEnabled ? 'ON' : 'OFF'; };
document.getElementById('gateToggleBtn').onclick = () => { gateEnabled = !gateEnabled; updateCompressorGate(); document.getElementById('gateToggleBtn').innerText = gateEnabled ? 'ON' : 'OFF'; };
document.getElementById('musicVolume').addEventListener('input', updateMusicVolume);
document.getElementById('stopMusicBtn').onclick = stopMusic;
document.getElementById('musicFileInput').addEventListener('change', async (e) => { if (e.target.files.length) await loadMusic(e.target.files[0]); });
document.getElementById('clearDataBtn').onclick = async () => {
  if(confirm("Apagar TODOS os episódios e takes?")){ await deleteAllData(); episodes = []; takes.forEach(t=>URL.revokeObjectURL(t.blobURL)); takes = []; renderTakes(); renderEpisodesList(); toast('Todos os dados removidos', 'info'); }
};
document.getElementById('newEpisodeBtn').onclick = () => { let title = prompt("Nome do episódio", "Meu Podcast"); if(title) createNewEpisode(title); };
document.getElementById('fabNewEpBtn').onclick = () => document.getElementById('newEpisodeBtn').click();
document.getElementById('epTitleInput').addEventListener('change', async () => { let ep = episodes.find(e => e.id === currentEpisodeId); if(ep) { ep.title = document.getElementById('epTitleInput').value; await saveEpisode(ep); } });
document.getElementById('epDescInput').addEventListener('change', async () => { let ep = episodes.find(e => e.id === currentEpisodeId); if(ep) { ep.desc = document.getElementById('epDescInput').value; await saveEpisode(ep); } });
document.getElementById('noiseSuppressBtn').onclick = async () => { let isOn = document.getElementById('noiseSuppressBtn').innerText === 'ON'; document.getElementById('noiseSuppressBtn').innerText = isOn ? 'OFF' : 'ON'; await connectMicrophone(document.getElementById('micDeviceSelect').value); };
document.getElementById('autoGainBtn').onclick = async () => { let isOn = document.getElementById('autoGainBtn').innerText === 'ON'; document.getElementById('autoGainBtn').innerText = isOn ? 'OFF' : 'ON'; await connectMicrophone(document.getElementById('micDeviceSelect').value); };

// ====================== INICIALIZAÇÃO ======================
(async function init() {
  await openDB();
  episodes = await getAllEpisodes();
  if (episodes.length === 0) await createNewEpisode("Episódio inaugural");
  else await loadEpisode(episodes[0].id);
  await loadAudioDevices();
  document.body.addEventListener('click', async () => { if (audioCtx && audioCtx.state === 'suspended') await audioCtx.resume(); }, { once: true });
  setInterval(() => {
    if (micSource && audioCtx) {
      try {
        const analyser = audioCtx.createAnalyser();
        micSource.connect(analyser);
        const arr = new Uint8Array(analyser.frequencyBinCount);
        analyser.getByteFrequencyData(arr);
        let avg = arr.reduce((a,b)=>a+b,0)/arr.length;
        let percent = Math.min(100, (avg/255)*100);
        document.getElementById('meterFill').style.width = percent + '%';
        analyser.disconnect();
      } catch(e) {}
    }
  }, 100);
  toast('🎙️ Estúdio pronto! Conecte seu microfone e música.', 'success');
})();
</script>
