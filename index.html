<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>PodCastMix · Estúdio Móvel</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}

:root {
  --bg: #0a0c10;
  --surface: #13171f;
  --surface2: #1a1f2a;
  --card: #1e2532;
  --border: rgba(255,255,255,0.08);
  --accent: #ff5e3a;
  --accent-glow: rgba(255,94,58,0.3);
  --text: #f0f3f8;
  --text2: #9aa6b9;
  --text3: #5f6c84;
  --green: #2ecc71;
  --red: #e74c3c;
  --amber: #f39c12;
  --radius: 20px;
  --radius-sm: 14px;
  --nav-h: 70px;
  --top-h: 64px;
  --font: 'Inter', sans-serif;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font);
  overflow: hidden;
  height: 100%;
  position: fixed;
  width: 100%;
}

/* scroll suave mobile */
.app-scroll {
  position: fixed;
  top: var(--top-h);
  bottom: var(--nav-h);
  left: 0;
  right: 0;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding: 16px 14px 24px;
}

/* header */
.top-bar {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  height: var(--top-h);
  background: rgba(10,12,16,0.92);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 16px;
  z-index: 20;
}
.logo h1 {
  font-size: 1.35rem;
  font-weight: 800;
  background: linear-gradient(135deg, #ff5e3a, #ffb347);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  letter-spacing: -0.5px;
}
.logo span {
  font-size: 0.7rem;
  color: var(--text3);
  font-weight: 500;
  display: block;
  margin-top: -4px;
}
.status-pill {
  background: var(--surface2);
  padding: 6px 12px;
  border-radius: 40px;
  font-size: 0.7rem;
  font-weight: 600;
  display: flex;
  align-items: center;
  gap: 6px;
}
.dot {
  width: 8px;
  height: 8px;
  border-radius: 10px;
  background: #6c7a8f;
}
.dot.rec { background: var(--red); box-shadow: 0 0 6px var(--red); animation: pulse 1s infinite; }
.dot.paused { background: var(--amber); }

/* bottom nav */
.bottom-nav {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  height: var(--nav-h);
  background: rgba(10,12,16,0.96);
  backdrop-filter: blur(20px);
  border-top: 1px solid var(--border);
  display: flex;
  justify-content: space-around;
  align-items: center;
  padding-bottom: env(safe-area-inset-bottom);
  z-index: 20;
}
.nav-btn {
  background: none;
  border: none;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  font-size: 0.7rem;
  font-weight: 600;
  color: var(--text3);
  transition: 0.2s;
  padding: 8px 12px;
  border-radius: 30px;
}
.nav-btn.active {
  color: var(--accent);
  background: rgba(255,94,58,0.12);
}
.nav-icon {
  font-size: 1.5rem;
}
.rec-fab {
  background: linear-gradient(145deg, var(--accent), #e63e17);
  width: 56px;
  height: 56px;
  border-radius: 56px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.8rem;
  box-shadow: 0 0 16px var(--accent-glow);
  margin-top: -12px;
  transition: 0.1s ease;
}
.rec-fab:active { transform: scale(0.94); }

/* cards */
.card {
  background: var(--card);
  border-radius: var(--radius);
  padding: 16px;
  margin-bottom: 16px;
  border: 1px solid var(--border);
}
.section-title {
  font-size: 0.8rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--text3);
  margin-bottom: 12px;
}
.btn-row {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}
.btn {
  padding: 12px 18px;
  border-radius: 40px;
  font-weight: 700;
  font-size: 0.85rem;
  border: none;
  background: var(--surface2);
  color: var(--text);
  cursor: pointer;
  transition: 0.1s;
  flex: 1 0 auto;
  text-align: center;
}
.btn-primary {
  background: linear-gradient(135deg, var(--accent), #e63e17);
  box-shadow: 0 4px 12px rgba(255,94,58,0.3);
}
.btn-danger { background: rgba(231,76,60,0.2); color: var(--red); }
.btn-success { background: rgba(46,204,113,0.2); color: var(--green); }
.btn:active { transform: scale(0.97); }

/* timer */
.timer {
  font-family: monospace;
  font-size: 2.6rem;
  font-weight: 800;
  letter-spacing: 2px;
  text-align: center;
  background: var(--surface);
  padding: 12px;
  border-radius: 60px;
  margin-bottom: 12px;
}
.meter {
  background: #0f111a;
  border-radius: 40px;
  height: 6px;
  overflow: hidden;
  margin: 10px 0;
}
.meter-fill {
  width: 0%;
  height: 100%;
  background: linear-gradient(90deg, var(--green), var(--amber), var(--accent));
}

/* takes list */
.take-item {
  background: var(--surface2);
  border-radius: var(--radius-sm);
  padding: 12px;
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 12px;
}
.take-name {
  font-weight: 600;
  flex: 1;
}
.take-actions button {
  background: none;
  border: none;
  font-size: 1.2rem;
  padding: 8px;
  cursor: pointer;
  color: var(--text2);
}
/* music tracks */
.track-row {
  background: var(--surface2);
  border-radius: var(--radius-sm);
  padding: 10px 12px;
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 8px;
}
.track-play {
  width: 42px;
  height: 42px;
  border-radius: 42px;
  background: var(--surface);
  border: none;
  font-size: 1.2rem;
  color: var(--text);
}
.track-info {
  flex: 1;
}
.track-title {
  font-weight: 600;
  font-size: 0.9rem;
}
.track-meta {
  font-size: 0.7rem;
  color: var(--text3);
}
/* eq sliders */
.eq-row {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 12px;
}
.eq-row label {
  width: 80px;
  font-size: 0.7rem;
  font-weight: 600;
}
input[type="range"] {
  flex: 1;
  height: 4px;
  -webkit-appearance: none;
  background: var(--surface);
  border-radius: 4px;
}
input[type="range"]:focus {
  outline: none;
}
input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 18px;
  height: 18px;
  border-radius: 18px;
  background: var(--accent);
  cursor: pointer;
}
/* select / inputs */
select, input, textarea {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 30px;
  padding: 12px 14px;
  color: var(--text);
  font-size: 0.85rem;
  width: 100%;
}
/* modal */
.modal-mask {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.8);
  backdrop-filter: blur(8px);
  z-index: 100;
  display: flex;
  align-items: flex-end;
  justify-content: center;
  visibility: hidden;
  opacity: 0;
  transition: 0.2s;
}
.modal-mask.open {
  visibility: visible;
  opacity: 1;
}
.modal-card {
  background: var(--card);
  width: 100%;
  border-radius: 28px 28px 0 0;
  padding: 24px 20px 32px;
  max-height: 85vh;
  overflow-y: auto;
}
/* toasts */
.toast-zone {
  position: fixed;
  bottom: 80px;
  left: 16px;
  right: 16px;
  z-index: 200;
  display: flex;
  flex-direction: column;
  gap: 8px;
  pointer-events: none;
}
.toast {
  background: var(--surface);
  border-left: 4px solid var(--accent);
  padding: 12px 16px;
  border-radius: 40px;
  font-size: 0.8rem;
  font-weight: 500;
  backdrop-filter: blur(12px);
}

@keyframes pulse { 0%,100%{ opacity:1; } 50%{ opacity:0.4; } }
</style>
</head>
<body>

<div class="top-bar">
  <div class="logo"><h1>PodCastMix</h1><span>estúdio híbrido</span></div>
  <div class="status-pill"><div class="dot" id="statusLed"></div><span id="statusLabel">Pronto</span></div>
</div>

<div class="app-scroll" id="appScroll">
  <!-- página estúdio -->
  <div id="studioPage">
    <!-- cabeçalho episódio -->
    <div class="card">
      <input type="text" id="epTitleInput" placeholder="Título do episódio" value="Episódio #1">
      <textarea id="epDescInput" rows="2" placeholder="Descrição..." style="margin-top:8px; resize:none;"></textarea>
    </div>

    <!-- seleção microfone externo -->
    <div class="card">
      <div class="section-title">🎙️ MICROFONE</div>
      <select id="micDeviceSelect"></select>
      <div style="font-size:12px; color:var(--text3); margin-top:6px;">🔌 Microfones externos / USB / Bluetooth aparecem aqui</div>
    </div>

    <!-- Mixer visual + timer -->
    <div class="card">
      <div class="timer" id="timerDisplay">00:00:00</div>
      <div class="meter"><div class="meter-fill" id="meterFill"></div></div>
      <div class="btn-row" style="margin-top:12px;">
        <button class="btn btn-primary" id="recBtn">⏺ GRAVAR</button>
        <button class="btn" id="pauseRecBtn" disabled>⏸ Pausar</button>
        <button class="btn btn-danger" id="stopRecBtn" disabled>⏹ Parar</button>
        <button class="btn btn-success" id="saveTakeBtn" disabled>💾 Salvar</button>
      </div>
    </div>

    <!-- TRILHA SONORA (mixagem automática) -->
    <div class="card">
      <div class="section-title">🎵 FUNDO MUSICAL (mixagem automática na gravação)</div>
      <div id="musicLibraryList"></div>
      <div class="btn-row" style="margin-top:8px;">
        <label class="btn" style="flex:1;">📁 Importar áudio<input type="file" id="musicFileInput" accept="audio/mpeg,audio/wav,audio/ogg,audio/mp4,audio/webm" style="display:none;"></label>
        <button class="btn" id="stopMusicBtn">🔇 Parar música</button>
      </div>
      <div style="margin-top:12px;">
        <label style="font-size:0.7rem;">Volume música durante gravação (ducking automático)</label>
        <input type="range" id="musicVolume" min="0" max="100" value="28">
        <span id="musicVolVal">28%</span>
      </div>
    </div>

    <!-- EQ e efeitos (voz) -->
    <div class="card">
      <div class="section-title">🎚️ EQ + COMPRESSOR (voz)</div>
      <div class="eq-row"><label>Graves (80Hz)</label><input type="range" id="eqBass" min="-12" max="12" value="2"><span id="eqBassVal">+2</span></div>
      <div class="eq-row"><label>Médios (1kHz)</label><input type="range" id="eqMid" min="-12" max="12" value="1"><span id="eqMidVal">+1</span></div>
      <div class="eq-row"><label>Agudos (8kHz)</label><input type="range" id="eqTreble" min="-12" max="12" value="3"><span id="eqTrebleVal">+3</span></div>
      <div class="eq-row"><label>Compressor</label><button class="btn" id="compToggleBtn" style="padding:6px 12px;">ON</button><span style="margin-left:8px;">Redução automática</span></div>
      <div class="eq-row"><label>Gate ruído</label><button class="btn" id="gateToggleBtn" style="padding:6px 12px;">ON</button></div>
    </div>

    <!-- Takes salvos -->
    <div class="card">
      <div class="section-title">📼 TAKES GRAVADOS</div>
      <div id="takesContainer"><div style="color:var(--text3); text-align:center;">Nenhum take ainda</div></div>
    </div>
  </div>

  <!-- página episódios (simplificada) -->
  <div id="episodesPage" style="display:none;">
    <div class="card">
      <div class="section-title">📋 MEUS EPISÓDIOS</div>
      <div id="episodesList"></div>
      <button class="btn btn-primary" id="newEpisodeBtn" style="margin-top:12px;">+ Novo Episódio</button>
    </div>
  </div>

  <!-- página configurações (rápida) -->
  <div id="settingsPage" style="display:none;">
    <div class="card">
      <div class="section-title">⚙️ Áudio</div>
      <div class="eq-row"><label>Cancelamento ruído</label><button class="btn" id="noiseSuppressBtn" style="padding:6px 12px;">ON</button></div>
      <div class="eq-row"><label>Ganho automático</label><button class="btn" id="autoGainBtn" style="padding:6px 12px;">ON</button></div>
      <div class="section-title" style="margin-top:16px;">💾 Armazenamento</div>
      <button class="btn btn-danger" id="clearDataBtn">Limpar todos os dados</button>
    </div>
  </div>
</div>

<!-- bottom nav -->
<div class="bottom-nav">
  <button class="nav-btn active" data-page="studio">🎙<span>Estúdio</span></button>
  <button class="nav-btn" data-page="episodes">📋<span>Episódios</span></button>
  <div class="rec-fab" id="fabRecBtn">⏺</div>
  <button class="nav-btn" data-page="settings">⚙️<span>Config</span></button>
  <button class="nav-btn" id="fabNewEpBtn">➕<span>Novo</span></button>
</div>
<div class="toast-zone" id="toastZone"></div>

<script>
// ----------------------------- MIXER CENTRAL (microfone + música em tempo real) -------------------------
let mixerCtx = null;
let micStream = null;
let micSource = null;
let micGainNode = null;        // ganho após EQ
let musicSourceNode = null;    // AudioBufferSourceNode atual
let musicGainNode = null;      // volume música
let musicBuffer = null;        // buffer da faixa ativa
let mixerDestination = null;   // MediaStreamDestination (para gravação)
let recorder = null;
let recordedChunks = [];
let isRecording = false;
let isPaused = false;
let recordingTimer = null;
let recordingSeconds = 0;

// estado
let currentEpisodeId = Date.now();
let episodes = [{ id: currentEpisodeId, title: "Episódio #1", desc: "", createdAt: Date.now(), takes: [] }];
let takes = [];  // { id, blobURL, duration, name }
let activeMusicFile = null;   // { buffer, name }

// EQ nodes (biquad)
let bassFilter, midFilter, trebleFilter;
let compressorNode, gateNode;
let noiseSuppression = true;
let autoGain = true;

// UI elements
const toastZone = document.getElementById('toastZone');
function toast(msg, type='info') {
  const t = document.createElement('div');
  t.className = 'toast';
  t.innerText = msg;
  toastZone.appendChild(t);
  setTimeout(() => t.remove(), 2800);
}

// Inicializa mixer (chamado na primeira interação)
async function initMixer() {
  if (mixerCtx && mixerCtx.state !== 'closed') return mixerCtx;
  mixerCtx = new (window.AudioContext || window.webkitAudioContext)();
  // criar nós de EQ e processamento
  bassFilter = mixerCtx.createBiquadFilter();
  bassFilter.type = 'peaking'; bassFilter.frequency.value = 80; bassFilter.Q.value = 0.7;
  midFilter = mixerCtx.createBiquadFilter();
  midFilter.type = 'peaking'; midFilter.frequency.value = 1000; midFilter.Q.value = 0.7;
  trebleFilter = mixerCtx.createBiquadFilter();
  trebleFilter.type = 'peaking'; trebleFilter.frequency.value = 8000; trebleFilter.Q.value = 0.7;
  
  compressorNode = mixerCtx.createDynamicsCompressor();
  compressorNode.threshold.value = -24;
  compressorNode.ratio.value = 4;
  compressorNode.attack.value = 0.003;
  compressorNode.release.value = 0.25;
  
  gateNode = mixerCtx.createGain();
  // Simulação simplificada de gate (expansor) usaremos gain automático depois
  
  micGainNode = mixerCtx.createGain();
  musicGainNode = mixerCtx.createGain();
  musicGainNode.gain.value = 0.28;
  
  mixerDestination = mixerCtx.createMediaStreamDestination();
  
  // Cadeia: microfone -> filtros -> compressor -> gate -> ganho -> destination
  // Música -> ganho -> destination
  return mixerCtx;
}

// Conectar microfone
async function connectMicrophone(deviceId = null) {
  if (micStream) {
    micStream.getTracks().forEach(t => t.stop());
    if (micSource) micSource.disconnect();
  }
  const constraints = { audio: { deviceId: deviceId ? { exact: deviceId } : undefined, echoCancellation: false, noiseSuppression: noiseSuppression, autoGainControl: autoGain } };
  micStream = await navigator.mediaDevices.getUserMedia(constraints);
  await initMixer();
  micSource = mixerCtx.createMediaStreamSource(micStream);
  // conexão com efeitos
  micSource.connect(bassFilter);
  bassFilter.connect(midFilter);
  midFilter.connect(trebleFilter);
  trebleFilter.connect(compressorNode);
  compressorNode.connect(micGainNode);
  micGainNode.connect(mixerDestination);
  micGainNode.connect(mixerCtx.destination); // monitoramento
  musicGainNode.connect(mixerDestination);
  musicGainNode.connect(mixerCtx.destination);
  
  updateMicEQ();
  toast(`🎤 Microfone conectado ${deviceId ? 'externo' : 'padrão'}`, 'success');
  return true;
}

function updateMicEQ() {
  if (!bassFilter) return;
  bassFilter.gain.value = parseFloat(document.getElementById('eqBass').value);
  midFilter.gain.value = parseFloat(document.getElementById('eqMid').value);
  trebleFilter.gain.value = parseFloat(document.getElementById('eqTreble').value);
  document.getElementById('eqBassVal').innerText = bassFilter.gain.value;
  document.getElementById('eqMidVal').innerText = midFilter.gain.value;
  document.getElementById('eqTrebleVal').innerText = trebleFilter.gain.value;
}

// Carregar música e tocar em loop (mixagem ativa)
async function loadAndPlayMusic(file) {
  if (musicSourceNode) {
    try { musicSourceNode.stop(); musicSourceNode.disconnect(); } catch(e) {}
  }
  const arrayBuffer = await file.arrayBuffer();
  const decoded = await mixerCtx.decodeAudioData(arrayBuffer);
  musicBuffer = decoded;
  const src = mixerCtx.createBufferSource();
  src.buffer = musicBuffer;
  src.loop = true;
  src.connect(musicGainNode);
  src.start();
  musicSourceNode = src;
  activeMusicFile = { name: file.name, buffer: decoded };
  toast(`🎵 "${file.name}" tocando e será mixado na gravação`, 'success');
}

function stopBackgroundMusic() {
  if (musicSourceNode) {
    try { musicSourceNode.stop(); musicSourceNode.disconnect(); } catch(e) {}
    musicSourceNode = null;
  }
  activeMusicFile = null;
  toast('🔇 Música desligada', 'info');
}

// Ducking automático durante fala (simples: reduz volume da música quando detecta entrada de voz)
let duckingInterval = null;
function startDuckingDetection() {
  if (duckingInterval) clearInterval(duckingInterval);
  if (!micSource) return;
  const analyser = mixerCtx.createAnalyser();
  analyser.fftSize = 256;
  micSource.connect(analyser);
  const data = new Uint8Array(analyser.frequencyBinCount);
  duckingInterval = setInterval(() => {
    if (!isRecording || isPaused || !musicGainNode) return;
    analyser.getByteFrequencyData(data);
    let sum = 0;
    for (let i=0; i<data.length; i++) sum += data[i];
    let avg = sum / data.length;
    let targetGain = (avg > 30) ? 0.12 : (parseInt(document.getElementById('musicVolume').value) / 100);
    targetGain = Math.min(0.35, targetGain);
    if (avg > 45) targetGain = 0.08;
    musicGainNode.gain.value = targetGain;
  }, 150);
}
function stopDuckingDetection() {
  if (duckingInterval) clearInterval(duckingInterval);
}

// RECORDER usando mixerDestination.stream
async function startRecording() {
  if (isRecording) return;
  if (!mixerCtx || mixerCtx.state === 'closed') await initMixer();
  if (!micStream) await connectMicrophone(document.getElementById('micDeviceSelect').value);
  if (mixerCtx.state === 'suspended') await mixerCtx.resume();
  
  const stream = mixerDestination.stream;
  if (!stream) throw new Error("Sem stream de mixagem");
  recorder = new MediaRecorder(stream, { mimeType: 'audio/webm' });
  recordedChunks = [];
  recorder.ondataavailable = e => { if (e.data.size > 0) recordedChunks.push(e.data); };
  recorder.start(100);
  isRecording = true;
  isPaused = false;
  recordingSeconds = 0;
  if (recordingTimer) clearInterval(recordingTimer);
  recordingTimer = setInterval(() => { if (!isPaused) { recordingSeconds++; updateTimerDisplay(); } }, 1000);
  document.getElementById('statusLed').className = 'dot rec';
  document.getElementById('statusLabel').innerText = 'GRAVANDO';
  document.getElementById('recBtn').innerHTML = '⏺ REC...';
  document.getElementById('pauseRecBtn').disabled = false;
  document.getElementById('stopRecBtn').disabled = false;
  document.getElementById('saveTakeBtn').disabled = true;
  startDuckingDetection();
  toast('🔴 Gravação iniciada — música sendo mixada automaticamente!', 'success');
}

function pauseRecording() {
  if (!isRecording) return;
  if (recorder && recorder.state === 'recording') {
    recorder.pause();
    isPaused = true;
    document.getElementById('statusLed').className = 'dot paused';
    document.getElementById('statusLabel').innerText = 'PAUSADO';
    document.getElementById('pauseRecBtn').innerHTML = '▶ Retomar';
    toast('Gravação pausada', 'info');
  } else if (recorder && recorder.state === 'paused') {
    recorder.resume();
    isPaused = false;
    document.getElementById('statusLed').className = 'dot rec';
    document.getElementById('statusLabel').innerText = 'GRAVANDO';
    document.getElementById('pauseRecBtn').innerHTML = '⏸ Pausar';
    toast('Gravação retomada', 'info');
  }
}

function stopRecording() {
  if (!isRecording) return;
  if (recorder && recorder.state !== 'inactive') {
    recorder.stop();
    recorder.onstop = () => {
      if (recordedChunks.length) {
        const blob = new Blob(recordedChunks, { type: 'audio/webm' });
        const url = URL.createObjectURL(blob);
        const takeName = `Take ${takes.length+1} - ${new Date().toLocaleTimeString()}`;
        const newTake = { id: Date.now(), blobURL: url, duration: recordingSeconds, name: takeName, blobData: blob };
        takes.push(newTake);
        renderTakes();
        document.getElementById('saveTakeBtn').disabled = false;
        toast(`✅ Take salvo: ${takeName}`, 'success');
      }
      recordedChunks = [];
    };
  }
  clearInterval(recordingTimer);
  isRecording = false; isPaused = false;
  document.getElementById('statusLed').className = 'dot';
  document.getElementById('statusLabel').innerText = 'Pronto';
  document.getElementById('recBtn').innerHTML = '⏺ GRAVAR';
  document.getElementById('pauseRecBtn').disabled = true;
  document.getElementById('stopRecBtn').disabled = true;
  stopDuckingDetection();
  if (musicGainNode) musicGainNode.gain.value = parseInt(document.getElementById('musicVolume').value)/100;
}

function saveCurrentTakePermanently() {
  if (!takes.length) return;
  const last = takes[takes.length-1];
  const episode = episodes.find(ep => ep.id === currentEpisodeId);
  if (episode) {
    episode.takes.push({ id: last.id, duration: last.duration, name: last.name });
    localStorage.setItem('podcast_episodes', JSON.stringify(episodes));
  }
  toast('Take arquivado no episódio', 'success');
  document.getElementById('saveTakeBtn').disabled = true;
}

function updateTimerDisplay() {
  let h = Math.floor(recordingSeconds/3600);
  let m = Math.floor((recordingSeconds%3600)/60);
  let s = recordingSeconds%60;
  document.getElementById('timerDisplay').innerText = `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
}

// Render takes na UI
function renderTakes() {
  const container = document.getElementById('takesContainer');
  if (!takes.length) { container.innerHTML = '<div style="color:var(--text3); text-align:center;">Nenhum take ainda</div>'; return; }
  container.innerHTML = takes.map((tk, idx) => `
    <div class="take-item">
      <div class="take-name">${tk.name}</div>
      <div>${Math.floor(tk.duration/60)}:${(tk.duration%60).toString().padStart(2,'0')}</div>
      <div class="take-actions">
        <button class="playTakeBtn" data-url="${tk.blobURL}">▶</button>
        <button class="deleteTakeBtn" data-idx="${idx}">🗑</button>
      </div>
    </div>
  `).join('');
  document.querySelectorAll('.playTakeBtn').forEach(btn => {
    btn.addEventListener('click', () => { new Audio(btn.dataset.url).play(); });
  });
  document.querySelectorAll('.deleteTakeBtn').forEach(btn => {
    btn.addEventListener('click', () => {
      const idx = parseInt(btn.dataset.idx);
      const removed = takes[idx];
      URL.revokeObjectURL(removed.blobURL);
      takes.splice(idx,1);
      renderTakes();
    });
  });
}

// Carregar dispositivos de áudio externos
async function loadAudioDevices() {
  await navigator.mediaDevices.getUserMedia({ audio: true });
  const devices = await navigator.mediaDevices.enumerateDevices();
  const mics = devices.filter(d => d.kind === 'audioinput');
  const select = document.getElementById('micDeviceSelect');
  select.innerHTML = mics.map(m => `<option value="${m.deviceId}">${m.label || 'Microfone'}</option>`).join('');
  if (mics.length) select.value = mics[0].deviceId;
  select.onchange = () => connectMicrophone(select.value);
  await connectMicrophone(select.value);
}

// Importar música
document.getElementById('musicFileInput').addEventListener('change', async (e) => {
  if (e.target.files.length) {
    await initMixer();
    await loadAndPlayMusic(e.target.files[0]);
  }
});
document.getElementById('stopMusicBtn').onclick = () => stopBackgroundMusic();
document.getElementById('musicVolume').oninput = (e) => {
  let val = e.target.value/100;
  if (musicGainNode) musicGainNode.gain.value = val;
  document.getElementById('musicVolVal').innerText = e.target.value+'%';
};
// Botões de gravação
document.getElementById('recBtn').onclick = startRecording;
document.getElementById('pauseRecBtn').onclick = pauseRecording;
document.getElementById('stopRecBtn').onclick = stopRecording;
document.getElementById('saveTakeBtn').onclick = saveCurrentTakePermanently;
// EQ listeners
['eqBass','eqMid','eqTreble'].forEach(id => {
  document.getElementById(id).addEventListener('input', updateMicEQ);
});
// Compressor toggle
let compEnabled = true;
document.getElementById('compToggleBtn').onclick = () => {
  compEnabled = !compEnabled;
  compressorNode.enabled = compEnabled;
  document.getElementById('compToggleBtn').innerText = compEnabled ? 'ON' : 'OFF';
  if(!compEnabled) compressorNode.ratio.value = 1;
  else compressorNode.ratio.value = 4;
};
// Gate simulado
let gateEnabled = true;
document.getElementById('gateToggleBtn').onclick = () => {
  gateEnabled = !gateEnabled;
  document.getElementById('gateToggleBtn').innerText = gateEnabled ? 'ON' : 'OFF';
};
// Noise supress / auto gain
document.getElementById('noiseSuppressBtn').onclick = () => { noiseSuppression = !noiseSuppression; connectMicrophone(document.getElementById('micDeviceSelect').value); document.getElementById('noiseSuppressBtn').innerText = noiseSuppression ? 'ON' : 'OFF'; };
document.getElementById('autoGainBtn').onclick = () => { autoGain = !autoGain; connectMicrophone(document.getElementById('micDeviceSelect').value); document.getElementById('autoGainBtn').innerText = autoGain ? 'ON' : 'OFF'; };

// Navegação e episódios
function renderEpisodes() {
  const container = document.getElementById('episodesList');
  if (!episodes.length) { container.innerHTML = '<div style="color:var(--text3);">Nenhum episódio</div>'; return; }
  container.innerHTML = episodes.map(ep => `<div class="take-item" style="flex-direction:column;align-items:flex-start;"><div><strong>${ep.title}</strong></div><div>${ep.takes.length} takes · ${new Date(ep.createdAt).toLocaleDateString()}</div><button class="btn" data-load="${ep.id}" style="margin-top:6px;padding:6px;">Carregar</button></div>`).join('');
  document.querySelectorAll('[data-load]').forEach(btn => {
    btn.addEventListener('click', (e) => {
      currentEpisodeId = parseInt(btn.dataset.load);
      const ep = episodes.find(e => e.id === currentEpisodeId);
      document.getElementById('epTitleInput').value = ep.title;
      document.getElementById('epDescInput').value = ep.desc || '';
      takes = ep.takes.map(t => ({ ...t, blobURL: null })); // not stored blob
      renderTakes();
      toast(`Episódio "${ep.title}" carregado`, 'success');
      showPage('studio');
    });
  });
}
function showPage(page) {
  document.getElementById('studioPage').style.display = page === 'studio' ? 'block' : 'none';
  document.getElementById('episodesPage').style.display = page === 'episodes' ? 'block' : 'none';
  document.getElementById('settingsPage').style.display = page === 'settings' ? 'block' : 'none';
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.querySelector(`.nav-btn[data-page="${page}"]`).classList.add('active');
  if(page === 'episodes') renderEpisodes();
}
document.querySelectorAll('.nav-btn').forEach(btn => {
  btn.addEventListener('click', () => showPage(btn.dataset.page));
});
document.getElementById('fabNewEpBtn').onclick = () => {
  const title = prompt("Título do novo episódio", "Episódio incrível");
  if(title){
    const newEp = { id: Date.now(), title, desc: "", createdAt: Date.now(), takes: [] };
    episodes.push(newEp);
    currentEpisodeId = newEp.id;
    document.getElementById('epTitleInput').value = title;
    document.getElementById('epDescInput').value = "";
    takes = [];
    renderTakes();
    showPage('studio');
    toast(`Novo episódio: ${title}`, 'success');
    localStorage.setItem('podcast_episodes', JSON.stringify(episodes));
  }
};
document.getElementById('newEpisodeBtn').onclick = () => document.getElementById('fabNewEpBtn').click();
document.getElementById('clearDataBtn').onclick = () => {
  if(confirm("Apagar todos os episódios e takes?")){
    localStorage.clear();
    episodes = [{ id: Date.now(), title: "Episódio #1", desc: "", createdAt: Date.now(), takes: [] }];
    takes = [];
    currentEpisodeId = episodes[0].id;
    renderTakes();
    renderEpisodes();
    toast("Dados resetados", 'info');
  }
};
// carregar dados salvos
const saved = localStorage.getItem('podcast_episodes');
if(saved) {
  episodes = JSON.parse(saved);
  currentEpisodeId = episodes[0]?.id || Date.now();
}
document.getElementById('epTitleInput').addEventListener('change', () => { let ep = episodes.find(e=>e.id===currentEpisodeId); if(ep) ep.title = document.getElementById('epTitleInput').value; localStorage.setItem('podcast_episodes', JSON.stringify(episodes)); });
document.getElementById('epDescInput').addEventListener('change', () => { let ep = episodes.find(e=>e.id===currentEpisodeId); if(ep) ep.desc = document.getElementById('epDescInput').value; localStorage.setItem('podcast_episodes', JSON.stringify(episodes)); });

// Inicializar microfones + mixer em interação (por causa autoplay)
document.body.addEventListener('click', async () => { if (!mixerCtx) await initMixer(); if (mixerCtx.state === 'suspended') mixerCtx.resume(); }, { once: true });
loadAudioDevices();
setInterval(() => {
  if (micSource && mixerCtx) {
    const analyser = mixerCtx.createAnalyser();
    try { micSource.connect(analyser); const arr = new Uint8Array(analyser.frequencyBinCount); analyser.getByteFrequencyData(arr); let lvl = Math.min(100, (arr.reduce((a,b)=>a+b,0)/arr.length)/2.55); document.getElementById('meterFill').style.width = lvl+'%'; } catch(e){}
  }
}, 120);
toast("🎙️ Conecte fone + microfone externo. Música toca e é mixada na gravação!", "info");
</script>
